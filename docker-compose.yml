version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: luxuryvoice-server
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads
    ports:
      - "${SERVER_PORT:-4000}:4000"
      - "40000-49999:40000-49999/udp"
    restart: unless-stopped
    networks:
      - luxuryvoice

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: luxuryvoice-client
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    restart: unless-stopped
    networks:
      - luxuryvoice

  nginx:
    image: nginx:1.27-alpine
    container_name: luxuryvoice-nginx
    depends_on:
      - client
      - server
    ports:
      - "${NGINX_PORT:-3000}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - luxuryvoice

  coturn:
    image: coturn/coturn:4.7.0
    container_name: luxuryvoice-coturn
    profiles:
      - turn
    env_file:
      - .env
    command: >
      -n
      --listening-port=3478
      --fingerprint
      --realm=${COTURN_REALM}
      --user=${COTURN_USER}:${COTURN_PASSWORD}
      --no-cli
      --no-multicast-peers
      --external-ip=${MEDIASOUP_ANNOUNCED_IP}
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    restart: unless-stopped
    networks:
      - luxuryvoice

networks:
  luxuryvoice:
    driver: bridge

